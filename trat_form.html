<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-RAT · Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #c84b31;
    --gold: #e8b84b;
    --soft: #d4cfc4;
    --shadow: rgba(26,26,46,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(232,184,75,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(200,75,49,0.1) 0%, transparent 50%);
  }

  .card {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 2px;
    max-width: 680px;
    width: 100%;
    box-shadow: 8px 8px 0 var(--ink);
    overflow: hidden;
    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 2.5rem 1.6rem;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: 'T-RAT';
    position: absolute;
    right: -10px; top: -18px;
    font-family: 'Playfair Display', serif;
    font-size: 7rem;
    font-weight: 900;
    color: rgba(255,255,255,0.04);
    pointer-events: none;
    letter-spacing: -4px;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    line-height: 1.2;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .header p {
    font-size: 0.82rem;
    opacity: 0.6;
    font-weight: 300;
  }

  /* ── Student name ── */
  .name-section {
    padding: 1.6rem 2.5rem 0;
    border-bottom: 1px dashed var(--soft);
    padding-bottom: 1.4rem;
  }
  .name-section label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .name-section input {
    width: 100%;
    border: 1.5px solid var(--soft);
    border-radius: 2px;
    padding: 0.65rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: #fafaf8;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-section input:focus { border-color: var(--ink); }

  /* ── Question ── */
  .question-section {
    padding: 1.8rem 2.5rem 0;
  }
  .q-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.6rem;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }

  /* ── Points HUD ── */
  .points-hud {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 2.5rem;
    background: #fafaf8;
    border-top: 1px solid var(--soft);
    border-bottom: 1px solid var(--soft);
    margin-top: 1.4rem;
  }
  .hud-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    flex: 1;
  }
  .dots {
    display: flex;
    gap: 6px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--soft);
    background: transparent;
    transition: background 0.25s, border-color 0.25s;
  }
  .dot.filled {
    background: var(--gold);
    border-color: var(--gold);
  }
  .remaining-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    min-width: 28px;
    text-align: right;
    transition: color 0.2s;
  }
  .remaining-num.zero { color: var(--accent); }

  /* ── Options ── */
  .options {
    padding: 1.2rem 2.5rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .option-row {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--soft);
    border-radius: 2px;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }
  .option-row:has(.stepper-btn:hover),
  .option-row.active {
    border-color: var(--ink);
    background: #fafaf8;
  }
  .option-letter {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
  }
  .option-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
    color: var(--ink);
  }
  .stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper-btn {
    width: 28px; height: 28px;
    border: 1.5px solid var(--soft);
    border-radius: 2px;
    background: #fff;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--ink);
    transition: background 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper-btn:hover:not(:disabled) { background: var(--ink); color: #fff; border-color: var(--ink); }
  .stepper-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .stepper-val {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    min-width: 18px;
    text-align: center;
    color: var(--ink);
  }
  .stepper-val.nonzero { color: var(--accent); font-weight: 700; }

  /* ── Submit ── */
  .footer {
    padding: 1.5rem 2.5rem 2rem;
  }
  .submit-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .submit-btn:hover { background: var(--accent); }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { background: var(--soft); cursor: not-allowed; color: #999; }

  /* ── Result ── */
  .result {
    display: none;
    padding: 2rem 2.5rem;
    text-align: center;
    animation: fadeIn 0.5s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .result.show { display: block; }
  .result-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
  .result h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1rem;
    color: var(--ink);
  }
  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    margin-bottom: 1.2rem;
  }
  .result-table th {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--soft);
    text-align: left;
  }
  .result-table td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px dashed var(--soft);
  }
  .result-table td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }
  .reset-btn {
    background: transparent;
    border: 1.5px solid var(--soft);
    color: var(--ink);
    padding: 0.6rem 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s;
  }
  .reset-btn:hover { border-color: var(--ink); }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- HEADER -->
  <div class="header">
    <div class="badge">T-RAT · Metodo Michaelsen</div>
    <h1 id="form-title">Titolo della domanda</h1>
    <p>Distribuisci al massimo <strong>4 punti</strong> tra le risposte che ritieni corrette.</p>
  </div>

  <!-- FORM SECTION -->
  <div id="form-body">

    <!-- Nome studente -->
    <div class="name-section">
      <label>Il tuo nome e cognome</label>
      <input type="text" id="student-name" placeholder="Es. Mario Rossi" autocomplete="off">
    </div>

    <!-- Domanda -->
    <div class="question-section">
      <div class="q-label">Domanda 1</div>
      <div class="q-text" id="question-text">
        Quale delle seguenti affermazioni descrive correttamente il metodo scientifico?
      </div>
    </div>

    <!-- Punti rimanenti HUD -->
    <div class="points-hud">
      <div class="hud-label">Punti rimanenti</div>
      <div class="dots">
        <div class="dot filled" id="d1"></div>
        <div class="dot filled" id="d2"></div>
        <div class="dot filled" id="d3"></div>
        <div class="dot filled" id="d4"></div>
      </div>
      <div class="remaining-num" id="remaining">4</div>
    </div>

    <!-- Opzioni -->
    <div class="options" id="options-container">
      <!-- Iniettato da JS -->
    </div>

    <!-- Submit -->
    <div class="footer">
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        Invia risposta →
      </button>
    </div>

  </div>

  <!-- RISULTATO -->
  <div class="result" id="result-section">
    <div class="result-icon">✓</div>
    <h2>Risposta inviata!</h2>
    <table class="result-table" id="result-table"></table>
    <button class="reset-btn" onclick="handleReset()">↺ Ricomincia</button>
  </div>

</div>

<script>
// ──────────────────────────────────────────────
//  CONFIGURAZIONE — modifica qui la tua domanda
// ──────────────────────────────────────────────
const CONFIG = {
  formTitle: "Quiz di Biologia — Cellula",
  questionText: "Quale delle seguenti affermazioni descrive correttamente la struttura della cellula eucariote?",
  options: [
    "Possiede un nucleo delimitato da membrana nucleare",
    "È priva di mitocondri e si basa solo sulla glicolisi",
    "Contiene ribosomi sia liberi sia ancorati al reticolo endoplasmatico",
    "Ha un DNA circolare privo di istoni come i procarioti"
  ]
};
// ──────────────────────────────────────────────

const LETTERS = ['A','B','C','D'];
let scores = [0,0,0,0];
const MAX = 4;

function remaining() { return MAX - scores.reduce((a,b) => a+b, 0); }

function init() {
  document.getElementById('form-title').textContent = CONFIG.formTitle;
  document.getElementById('question-text').textContent = CONFIG.questionText;
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  CONFIG.options.forEach((text, i) => {
    container.innerHTML += `
      <div class="option-row" id="row-${i}">
        <span class="option-letter">${LETTERS[i]}</span>
        <span class="option-text">${text}</span>
        <div class="stepper">
          <button class="stepper-btn" id="dec-${i}" onclick="change(${i},-1)" disabled>−</button>
          <span class="stepper-val" id="val-${i}">0</span>
          <button class="stepper-btn" id="inc-${i}" onclick="change(${i},1)">+</button>
        </div>
      </div>`;
  });
  updateHUD();
}

function change(i, delta) {
  const rem = remaining();
  if (delta > 0 && rem === 0) return;
  if (delta < 0 && scores[i] === 0) return;
  scores[i] += delta;
  updateHUD();
}

function updateHUD() {
  const rem = remaining();
  // dots
  for (let d = 1; d <= 4; d++) {
    document.getElementById('d'+d).classList.toggle('filled', d <= rem);
  }
  const numEl = document.getElementById('remaining');
  numEl.textContent = rem;
  numEl.className = 'remaining-num' + (rem === 0 ? ' zero' : '');

  // option controls
  scores.forEach((v, i) => {
    const valEl = document.getElementById('val-'+i);
    valEl.textContent = v;
    valEl.className = 'stepper-val' + (v > 0 ? ' nonzero' : '');
    document.getElementById('inc-'+i).disabled = (rem === 0);
    document.getElementById('dec-'+i).disabled = (v === 0);
    document.getElementById('row-'+i).classList.toggle('active', v > 0);
  });

  // submit button
  const used = MAX - rem;
  document.getElementById('submit-btn').disabled = (used === 0);
}

function handleSubmit() {
  const name = document.getElementById('student-name').value.trim();
  if (!name) {
    document.getElementById('student-name').focus();
    document.getElementById('student-name').style.borderColor = '#c84b31';
    return;
  }

  // Build result table
  let rows = `<tr>
    <th>Opzione</th><th>Risposta</th><th>Punti</th>
  </tr>`;
  CONFIG.options.forEach((text, i) => {
    if (scores[i] > 0) {
      rows += `<tr>
        <td><strong>${LETTERS[i]}</strong></td>
        <td>${text}</td>
        <td>${scores[i]}</td>
      </tr>`;
    }
  });
  document.getElementById('result-table').innerHTML = rows;

  document.getElementById('form-body').style.display = 'none';
  const res = document.getElementById('result-section');
  res.classList.add('show');
  res.querySelector('h2').textContent = `Grazie, ${name}!`;
}

function handleReset() {
  scores = [0,0,0,0];
  document.getElementById('student-name').value = '';
  document.getElementById('student-name').style.borderColor = '';
  document.getElementById('form-body').style.display = 'block';
  document.getElementById('result-section').classList.remove('show');
  init();
}

// Start
init();
</script>
</body>
</html>
