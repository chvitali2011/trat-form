<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I-RAT / T-RAT · Isolamento termico e acustico</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F5F4F0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #FAFAF8;
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
    border: 0.5px solid #D3D1C7;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .badge {
    display: inline-block;
    background: #dc2626;
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .card h1 {
    color: #2C2C2A;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .subtitle {
    color: #5F5E5A;
    font-size: 13px;
    margin-bottom: 24px;
  }

  .name-input {
    width: 100%;
    background: #F1EFE8;
    border: 1px solid #D3D1C7;
    border-radius: 8px;
    color: #2C2C2A;
    padding: 10px 14px;
    font-size: 14px;
    margin-bottom: 24px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #378ADD; }
  .name-input::placeholder { color: #888780; }

  /* Progress */
  .progress-bar {
    background: #E8E6DF;
    border-radius: 8px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #378ADD, #1D9E75);
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .progress-label {
    color: #888780;
    font-size: 12px;
    margin-bottom: 20px;
  }

  /* Question */
  .question-text {
    color: #2C2C2A;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 20px;
    padding: 16px;
    background: #F1EFE8;
    border-radius: 10px;
    border-left: 3px solid #378ADD;
  }

  /* Points remaining */
  .points-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .points-label { color: #5F5E5A; font-size: 13px; }
  .points-count {
    background: #F1EFE8;
    color: #2C2C2A;
    font-size: 22px;
    font-weight: 700;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #D3D1C7;
    transition: color 0.2s, border-color 0.2s;
  }
  .points-count.zero { color: #1D9E75; border-color: #1D9E75; }
  .points-count.warning { color: #BA7517; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .option {
    background: #F1EFE8;
    border: 1px solid #D3D1C7;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.2s, background 0.2s;
  }
  .option.has-points { border-color: #378ADD; background: #E6F1FB; }

  .option-left { display: flex; align-items: center; gap: 12px; }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: #E8E6DF;
    color: #888780;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .option.has-points .option-letter { background: #378ADD; color: white; }

  .option-text { color: #444441; font-size: 14px; line-height: 1.4; }
  .option.has-points .option-text { color: #0C447C; }

  .option-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .btn-ctrl {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    line-height: 1;
  }
  .btn-ctrl:active { transform: scale(0.9); }
  .btn-minus { background: #E8E6DF; color: #888780; }
  .btn-minus:hover { background: #D3D1C7; color: #2C2C2A; }
  .btn-plus { background: #378ADD; color: white; }
  .btn-plus:hover { background: #185FA5; }
  .btn-plus:disabled { background: #D3D1C7; color: #888780; cursor: not-allowed; }

  .opt-points {
    color: #2C2C2A;
    font-size: 18px;
    font-weight: 700;
    min-width: 20px;
    text-align: center;
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: #378ADD;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit:hover { background: #185FA5; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: #D3D1C7; color: #888780; cursor: not-allowed; }

  /* Next button */
  .btn-next {
    width: 100%;
    padding: 14px;
    background: #F1EFE8;
    color: #378ADD;
    border: 1px solid #378ADD;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-next:hover { background: #E6F1FB; }

  /* Success screen */
  .success {
    display: none;
    text-align: center;
    padding: 20px 0;
  }
  .success.show { display: block; }
  .success-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .success h2 { color: #1D9E75; font-size: 24px; margin-bottom: 8px; }
  .success p { color: #5F5E5A; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

  .summary {
    background: #F1EFE8;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    text-align: left;
  }
  .summary-title { color: #888780; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #E8E6DF;
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-q { color: #5F5E5A; flex: 1; padding-right: 12px; }
  .summary-pts { color: #185FA5; font-weight: 700; white-space: nowrap; }

  .btn-restart {
    background: #F1EFE8;
    color: #5F5E5A;
    border: 1px solid #D3D1C7;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-restart:hover { background: #E8E6DF; color: #2C2C2A; }

  .form-section { display: block; }
  .form-section.hide { display: none; }
</style>
</head>
<body>

<div class="card">

  <!-- Header sempre visibile -->
  <div class="badge">I-RAT / T-RAT · Metodo Michaelsen</div>
  <h1>Isolamento termico e acustico – classe 3F</h1>
  <p class="subtitle">Distribuisci al massimo <strong style="color:#2C2C2A">4 punti</strong> tra le risposte che ritieni corrette.</p>

  <!-- Sezione form -->
  <div class="form-section" id="formSection">

    <input type="text" class="name-input" id="nameInput" placeholder="Il tuo nome e cognome">

    <!-- Progress -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:25%"></div>
    </div>
    <div class="progress-label" id="progressLabel">Domanda 1 di 4</div>

    <!-- Domanda -->
    <div class="question-text" id="questionText"></div>

    <!-- Punti rimasti -->
    <div class="points-bar">
      <span class="points-label">Punti rimanenti</span>
      <div class="points-count" id="pointsCount">4</div>
    </div>

    <!-- Opzioni -->
    <div class="options" id="optionsContainer"></div>

    <!-- Pulsante invia / prossima -->
    <button class="btn-submit" id="btnSubmit" onclick="nextOrSubmit()">
      Domanda successiva →
    </button>

  </div>

  <!-- Schermata successo -->
  <div class="success" id="successScreen">
    <div class="success-icon">✓</div>
    <h2>Risposta inviata!</h2>
    <p>Le tue risposte sono state registrate.<br>Attendi le istruzioni della docente.</p>
    <div class="summary" id="summaryBox"></div>
    <button class="btn-restart" onclick="restart()">↺ Ricomincia</button>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    text: "D1 — Cos'è il bilancio termico di un edificio?",
    options: [
      "La quantità totale di calore prodotta dal riscaldamento",
      "La differenza tra il calore che entra e il calore che esce dall'edificio",
      "Il costo annuale dell'energia per riscaldare un appartamento",
      "La temperatura media interna di un edificio in inverno"
    ]
  },
  {
    text: "D2 — Perché il ponte termico è un problema in un edificio?",
    options: [
      "Perché aumenta la temperatura interna in estate",
      "Perché blocca il passaggio dell'aria tra interno ed esterno",
      "Perché è un punto debole dove il calore disperso è maggiore, causando anche umidità e muffa",
      "Perché riduce la resistenza strutturale delle pareti"
    ]
  },
  {
    text: "D3 — Cosa succede quando un'onda sonora incontra una parete spessa e pesante?",
    options: [
      "Viene completamente riflessa e torna indietro",
      "Accelera e attraversa la parete più velocemente",
      "Viene in parte assorbita e in parte trasmessa, ma la maggior parte viene bloccata",
      "Si trasforma in calore e scompare completamente"
    ]
  },
  {
    text: "D4 — Quale tra questi materiali isola meglio sia dal calore che dal rumore?",
    options: [
      "Polistirene espanso (EPS)",
      "Vetro semplice",
      "Lana di roccia",
      "Calcestruzzo armato"
    ]
  }
];

const LETTERS = ['A', 'B', 'C', 'D'];
let currentQ = 0;
let points = [0, 0, 0, 0];
let allAnswers = [];

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  points = [0, 0, 0, 0];

  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressFill').style.width = ((currentQ + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `Domanda ${currentQ + 1} di ${QUESTIONS.length}`;

  const isLast = currentQ === QUESTIONS.length - 1;
  document.getElementById('btnSubmit').textContent = isLast ? 'Invia risposta →' : 'Domanda successiva →';

  updatePointsDisplay();
  renderOptions();
}

function renderOptions() {
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  QUESTIONS[currentQ].options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.id = `opt${i}`;
    div.innerHTML = `
      <div class="option-left">
        <div class="option-letter" id="letter${i}">${LETTERS[i]}</div>
        <div class="option-text">${opt}</div>
      </div>
      <div class="option-controls">
        <button class="btn-ctrl btn-minus" onclick="change(${i}, -1)">−</button>
        <span class="opt-points" id="pts${i}">0</span>
        <button class="btn-ctrl btn-plus" id="plus${i}" onclick="change(${i}, +1)">+</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function change(idx, delta) {
  const remaining = 4 - points.reduce((a,b) => a+b, 0);
  if (delta > 0 && remaining <= 0) return;
  if (delta < 0 && points[idx] <= 0) return;

  points[idx] += delta;
  document.getElementById(`pts${idx}`).textContent = points[idx];

  const opt = document.getElementById(`opt${idx}`);
  opt.className = points[idx] > 0 ? 'option has-points' : 'option';

  updatePointsDisplay();
  updatePlusButtons();
  updateSubmitButton();
}

function updatePointsDisplay() {
  const rem = 4 - points.reduce((a,b) => a+b, 0);
  const el = document.getElementById('pointsCount');
  el.textContent = rem;
  el.className = rem === 0 ? 'points-count zero' : (rem < 4 ? 'points-count warning' : 'points-count');
}

function updatePlusButtons() {
  const rem = 4 - points.reduce((a,b) => a+b, 0);
  for (let i = 0; i < 4; i++) {
    document.getElementById(`plus${i}`).disabled = rem <= 0;
  }
}

function updateSubmitButton() {
  const total = points.reduce((a,b) => a+b, 0);
  document.getElementById('btnSubmit').disabled = total === 0;
}

function nextOrSubmit() {
  // save answers for this question
  allAnswers.push({
    question: QUESTIONS[currentQ].text,
    points: [...points]
  });

  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showSuccess();
  }
}

function showSuccess() {
  document.getElementById('formSection').classList.add('hide');
  const s = document.getElementById('successScreen');
  s.classList.add('show');

  // Build summary
  const box = document.getElementById('summaryBox');
  box.innerHTML = '<div class="summary-title">Riepilogo risposte</div>';
  const name = document.getElementById('nameInput').value || 'Anonimo';

  allAnswers.forEach((ans, qi) => {
    const row = document.createElement('div');
    row.className = 'summary-row';
    const ptsStr = LETTERS.map((l, i) => `${l}:${ans.points[i]}`).join('  ');
    row.innerHTML = `<span class="summary-q">D${qi+1}</span><span class="summary-pts">${ptsStr}</span>`;
    box.appendChild(row);
  });
}

function restart() {
  currentQ = 0;
  allAnswers = [];
  document.getElementById('nameInput').value = '';
  document.getElementById('formSection').classList.remove('hide');
  document.getElementById('successScreen').classList.remove('show');
  renderQuestion();
  updateSubmitButton();
}

// Init
renderQuestion();
updateSubmitButton();
</script>
</body>
</html>
